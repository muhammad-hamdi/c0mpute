# c0mpute plugin manifest. See dips/0006-module-model.md.

[module]
id          = "coinpay"
name        = "CoinPay — DID, payments, escrow, reputation"
version     = "0.1.0"
kind        = "service"
description = "Decentralized identifiers, wallet linking, escrow, signed receipts, and worker reputation. The trust spine of the c0mpute network."
author      = "Profullstack"
license     = "Apache-2.0"
homepage    = "https://c0mpute.com/coinpay"
keywords    = ["did", "identity", "escrow", "payments", "reputation"]

[module.requirements]
c0mpute      = ">=0.1.0"
os           = ["linux", "darwin"]
arch         = ["x86_64", "aarch64"]
capabilities = []

[module.dispatch]
mode   = "subprocess"
binary = "coinpay"
# Standalone CLI on PATH. The c0mpute umbrella forwards `c0mpute coinpay
# <args>` straight through. See plugins/coinpay/cli for the source.

[module.surfaces]
cli = "coinpay"
# web = "c0mpute.com/coinpay"  # planned, see roadmap
